# CI orchestration tasks (Phase 7) - included from root Taskfile.yml with flatten: true.
# https://taskfile.dev/
version: "3"

tasks:
  test-integration-ci-mongodb:
    desc: Integration CI flow for mongodb category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: mongodb
          SERVICES: mongodb mongo-init migrate

  test-integration-ci-pulsar:
    desc: Integration CI flow for pulsar category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: pulsar
          SERVICES: pulsar

  test-integration-ci-dispatch:
    desc: Integration CI flow for dispatch category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: dispatch
          SERVICES: mongodb mongo-init migrate pulsar

  test-integration-ci-http:
    desc: Integration CI flow for http category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: http
          SERVICES: mongodb mongo-init migrate

  test-integration-ci-cli:
    desc: Integration CI flow for cli category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: cli
          SERVICES: mongodb mongo-init migrate

  test-e2e-ci:
    desc: E2E CI flow (full stack; matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-e2e-run

  ci-integration-run:
    internal: true
    dotenv:
      - .env
    cmds:
      - ./scripts/ci-start-compose-services.sh "{{.SERVICES}}"
      - defer: { task: ci-cleanup }
      - task: ci-migrate-if-needed
        vars: { SERVICES: "{{.SERVICES}}" }
      - env INTEGRATION_TESTS=true TEST_CATEGORY={{.CATEGORY}} task test-integration-category

  ci-migrate-if-needed:
    internal: true
    cmds:
      - task: migrate-build
      - docker compose up --exit-code-from migrate --abort-on-container-exit migrate
    status:
      - '! echo "{{.SERVICES}}" | grep -q migrate'

  ci-e2e-run:
    internal: true
    dotenv:
      - .env
    cmds:
      - ./scripts/ci-start-compose-services.sh "mongodb mongo-init migrate pulsar"
      - defer: { task: ci-cleanup }
      - task: migrate-build
      - docker compose up --exit-code-from migrate --abort-on-container-exit migrate
      - docker compose up -d --build jobs-server jobs-dispatcher jobs-executor
      - ./scripts/compose-wait-full.sh
      - env INTEGRATION_TESTS=true TEST_CATEGORY=e2e task test-integration-category

  ci-cleanup:
    internal: true
    cmds:
      - docker compose logs > ci-compose.log 2>&1 || true
      - docker compose down -v
