# Integration test tasks (included from root Taskfile.yml with flatten: true).
# https://taskfile.dev/
version: "3"

vars:
  INTEGRATION_TEST_FLAGS: '{{.INTEGRATION_TEST_FLAGS | default "-p 1 -parallel 1 -count=1"}}'

tasks:
  test-integration:
    desc: Integration tests; loads .env; sets INTEGRATION_TESTS=true; needs MongoDB (see docs)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=all task test-integration-category

  test-integration-category:
    desc: Core runner — INTEGRATION_TESTS guard + TEST_CATEGORY package selection
    dotenv:
      - .env
    cmds:
      - |
        case "$(printf '%s' "${INTEGRATION_TESTS:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')" in
          true|1|yes) ;;
          *)
            echo "integration tests skipped (set INTEGRATION_TESTS=true to run)"
            exit 0
            ;;
        esac
        PACKAGES="$(./scripts/integration-category-resolve.sh resolve)"
        RUN_FILTER=""
        case "${TEST_CATEGORY:-all}" in
          e2e) RUN_FILTER="-run TestE2EIntegration" ;;
        esac
        go test {{ .INTEGRATION_TEST_FLAGS }} ${RUN_FILTER} -v ${PACKAGES}

  test-integration-category-resolve:
    desc: Smoke test TEST_CATEGORY → package mapping (no go test)
    cmds:
      - ./scripts/integration-category-resolve.sh

  test-integration-mongodb:
    desc: Integration tests — MongoDB category (mongodb, mongo-init, migrate)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=mongodb task test-integration-category

  test-integration-pulsar:
    desc: Integration tests — Pulsar category (pulsar only)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=pulsar task test-integration-category

  test-integration-dispatch:
    desc: Integration tests — dispatch saga category (mongodb + pulsar)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=dispatch task test-integration-category

  test-integration-http:
    desc: Integration tests — HTTP handler category (mongodb)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=http task test-integration-category

  test-integration-cli:
    desc: Integration tests — jobs-cli category (mongodb)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=cli task test-integration-category

  test-e2e:
    desc: E2E integration tests (full stack); loads .env; needs task docker-up
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=e2e task test-integration-category
