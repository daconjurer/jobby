# Integration test tasks (included from root Taskfile.yml with flatten: true).
# https://taskfile.dev/
version: "3"

vars:
  INTEGRATION_TEST_FLAGS: '{{.INTEGRATION_TEST_FLAGS | default "-p 1 -parallel 1 -count=1"}}'

tasks:
  test-integration:
    desc: Integration tests; loads .env; sets INTEGRATION_TESTS=true; needs MongoDB (see docs)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=all task test-integration-category

  test-integration-category:
    desc: Core runner — INTEGRATION_TESTS guard + TEST_CATEGORY package selection
    dotenv:
      - .env
    cmds:
      - |
        case "$(printf '%s' "${INTEGRATION_TESTS:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')" in
          true|1|yes) ;;
          *)
            echo "integration tests skipped (set INTEGRATION_TESTS=true to run)"
            exit 0
            ;;
        esac
        PACKAGES="$(./scripts/integration-category-resolve.sh resolve)"
        RUN_FILTER=""
        case "${TEST_CATEGORY:-all}" in
          e2e) RUN_FILTER="-run TestE2EIntegration" ;;
        esac
        go test {{ .INTEGRATION_TEST_FLAGS }} ${RUN_FILTER} -v ${PACKAGES}

  test-integration-category-resolve:
    desc: Smoke test TEST_CATEGORY → package mapping (no go test)
    cmds:
      - ./scripts/integration-category-resolve.sh

  test-integration-mongodb:
    desc: Integration tests — MongoDB category (mongodb, mongo-init, migrate)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=mongodb task test-integration-category

  test-integration-pulsar:
    desc: Integration tests — Pulsar category (pulsar only)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=pulsar task test-integration-category

  test-integration-dispatch:
    desc: Integration tests — dispatch saga category (mongodb + pulsar)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=dispatch task test-integration-category

  test-integration-http:
    desc: Integration tests — HTTP handler category (mongodb)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=http task test-integration-category

  test-integration-cli:
    desc: Integration tests — jobs-cli category (mongodb)
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=cli task test-integration-category

  test-e2e:
    desc: E2E integration tests (full stack); loads .env; needs task docker-up
    cmds:
      - env INTEGRATION_TESTS=true TEST_CATEGORY=e2e task test-integration-category

  # --- CI orchestration tasks (Phase 7) ---

  test-integration-ci-mongodb:
    desc: Integration CI flow for mongodb category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: mongodb
          SERVICES: mongodb mongo-init migrate

  test-integration-ci-pulsar:
    desc: Integration CI flow for pulsar category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: pulsar
          SERVICES: pulsar

  test-integration-ci-dispatch:
    desc: Integration CI flow for dispatch category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: dispatch
          SERVICES: mongodb mongo-init migrate pulsar

  test-integration-ci-http:
    desc: Integration CI flow for http category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: http
          SERVICES: mongodb mongo-init migrate

  test-integration-ci-cli:
    desc: Integration CI flow for cli category (matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-integration-run
        vars:
          CATEGORY: cli
          SERVICES: mongodb mongo-init migrate

  test-e2e-ci:
    desc: E2E CI flow (full stack; matches GitHub Actions; local reproduction)
    cmds:
      - task: ci-e2e-run

  ci-integration-run:
    internal: true
    dotenv:
      - .env
    cmds:
      - ./scripts/ci-start-compose-services.sh "{{.SERVICES}}"
      - defer: { task: ci-cleanup }
      - task: ci-migrate-if-needed
        vars: { SERVICES: "{{.SERVICES}}" }
      - env INTEGRATION_TESTS=true TEST_CATEGORY={{.CATEGORY}} task test-integration-category

  ci-migrate-if-needed:
    internal: true
    cmds:
      - task: migrate-build
      - docker compose up --exit-code-from migrate --abort-on-container-exit migrate
    status:
      - '! echo "{{.SERVICES}}" | grep -q migrate'

  ci-e2e-run:
    internal: true
    dotenv:
      - .env
    cmds:
      - ./scripts/ci-start-compose-services.sh "mongodb mongo-init migrate pulsar"
      - defer: { task: ci-cleanup }
      - task: migrate-build
      - docker compose up --exit-code-from migrate --abort-on-container-exit migrate
      - docker compose up -d --build jobs-server jobs-dispatcher jobs-executor
      - ./scripts/compose-wait-full.sh
      - env INTEGRATION_TESTS=true TEST_CATEGORY=e2e task test-integration-category

  ci-cleanup:
    internal: true
    cmds:
      - docker compose logs > ci-compose.log 2>&1 || true
      - docker compose down -v
