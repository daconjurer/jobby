name: e2e-tests

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
  workflow_dispatch:

env:
  E2E_COMPOSE_SERVICES: mongodb mongo-init migrate pulsar jobs-server jobs-dispatcher jobs-executor
  E2E_INFRA_SERVICES: mongodb mongo-init migrate pulsar
  E2E_APP_SERVICES: jobs-server jobs-dispatcher jobs-executor

jobs:
  e2e:
    name: e2e-tests
    runs-on: ubuntu-latest
    environment: base
    env:
      GOFLAGS: -buildvcs=false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up E2E job
        uses: ./.github/actions/integration-setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run E2E tests (task-based orchestration)
        run: task test-e2e-ci

      - name: Upload Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: ci-compose.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Safety cleanup
        if: always()
        run: docker compose down -v || true
