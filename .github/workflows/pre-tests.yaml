name: pre-tests

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  lint-format-check:
    name: Preliminary checks
    runs-on: ubuntu-latest
    environment: base
    # `go list`/`gofmt` chains can trigger VCS stamping; inside container actions `.git`
    # on the mounted workspace sometimes causes `git exit 128` (ownership / stamping).
    env:
      GOFLAGS: "-buildvcs=false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run formatter and linter (Task)
        uses: ./.github/actions/pre-test/
