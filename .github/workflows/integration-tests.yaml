name: integration-tests

on:
  workflow_call:
    inputs:
      category:
        required: true
        type: string
      compose_services:
        required: false
        type: string
        default: ""
        description: Space-separated Compose services (e.g. "mongodb mongo-init migrate")
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      category:
        required: true
        type: choice
        description: Integration test category to run
        options:
          - mongodb
          - pulsar
          - dispatch
          - http
          - cli

jobs:
  integration:
    name: integration-${{ inputs.category }}
    runs-on: ubuntu-latest
    environment: base
    env:
      GOFLAGS: -buildvcs=false
      INTEGRATION_TESTS: "true"
      TEST_CATEGORY: ${{ inputs.category }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Compose services
        id: compose
        shell: bash
        run: |
          set -euo pipefail
          services="${{ inputs.compose_services }}"
          if [ -z "$services" ]; then
            case "${{ inputs.category }}" in
              mongodb|http|cli) services="mongodb mongo-init migrate" ;;
              pulsar) services="pulsar" ;;
              dispatch) services="mongodb mongo-init migrate pulsar" ;;
              *)
                echo "unknown category: ${{ inputs.category }}" >&2
                exit 1
                ;;
            esac
          fi
          echo "services=$services" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: ./.github/actions/install-task

      - name: Prepare environment
        run: |
          cp .env.example .env
          task mongo-replica-key

      - name: Start Compose services
        env:
          COMPOSE_SERVICES: ${{ steps.compose.outputs.services }}
        run: |
          set -euo pipefail
          background=""
          wait_services=""
          has_migrate=false
          for service in $COMPOSE_SERVICES; do
            if [ "$service" = "migrate" ]; then
              has_migrate=true
            else
              background="${background:+$background }$service"
              wait_services="${wait_services:+$wait_services }$service"
            fi
          done
          if [ -z "$background" ]; then
            echo "compose_services must include at least one non-migrate service" >&2
            exit 1
          fi
          docker compose pull $background
          docker compose up -d $background
          ./scripts/wait-for-compose-services.sh "$wait_services"
          if $has_migrate; then
            docker compose build migrate
            docker compose up --exit-code-from migrate --abort-on-container-exit migrate
          fi

      - name: Collect Compose logs on failure
        if: failure()
        env:
          COMPOSE_SERVICES: ${{ steps.compose.outputs.services }}
        run: |
          docker compose logs $COMPOSE_SERVICES | tee compose-failure.log

      - name: Upload Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-${{ inputs.category }}-compose-logs
          path: compose-failure.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Run integration tests
        run: task test-integration-${{ inputs.category }}

      - name: Stop services
        if: always()
        run: docker compose down -v
