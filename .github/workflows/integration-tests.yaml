name: integration-tests

on:
  workflow_call:
    inputs:
      category:
        required: true
        type: string
      compose_services:
        required: false
        type: string
        default: ""
        description: Space-separated Compose services (e.g. "mongodb mongo-init migrate")
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      category:
        required: true
        type: choice
        description: Integration test category to run
        options:
          - mongodb
          - pulsar
          - dispatch
          - http
          - cli

jobs:
  integration:
    name: integration-${{ inputs.category }}
    runs-on: ubuntu-latest
    environment: base
    env:
      GOFLAGS: -buildvcs=false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up integration job
        uses: ./.github/actions/integration-setup
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run integration tests (task-based orchestration)
        run: task test-integration-ci-${{ inputs.category }}

      - name: Upload Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-${{ inputs.category }}-logs
          path: ci-compose.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Safety cleanup
        if: always()
        run: docker compose down -v || true
