name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-tests:
    uses: ./.github/workflows/pre-tests.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  unit-tests:
    uses: ./.github/workflows/unit-tests.yaml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  integration-mongodb:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind
        options: --privileged
    env:
      DOCKER_HOST: tcp://docker:2375
      GOFLAGS: -buildvcs=false
      INTEGRATION_TESTS: "true"
      TEST_CATEGORY: mongodb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Prepare environment
        run: |
          cp .env.example .env
          task mongo-replica-key

      - name: Start MongoDB services
        run: docker compose up -d mongodb mongo-init migrate

      - name: Wait for services
        run: ./scripts/wait-for-compose-services.sh "mongodb mongo-init migrate"

      - name: Run MongoDB integration tests
        run: task test-integration-mongodb

      - name: Stop services
        if: always()
        run: docker compose down -v
