name: Integration setup
description: Checkout, Docker login, Go, Task, and .env preparation for integration jobs
secrets:
  DOCKER_USERNAME:
    required: true
  DOCKER_PASSWORD:
    required: true
runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Install Task
      uses: ./.github/actions/install-task

    - name: Prepare environment
      shell: bash
      run: |
        set -euo pipefail
        cp .env.example .env
        task mongo-replica-key
