services:
  mongodb:
    image: mongo:8.0
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: jobby_admin
      MONGO_INITDB_ROOT_PASSWORD: jobby_admin_pass
      MONGO_INITDB_DATABASE: jobby
    volumes:
      - mongodb_data:/data/db
      # Phase 2: remove mongo-init; schema is applied via cmd/migrate (migrations/).
      # - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_data:
