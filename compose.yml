services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    image: jobby-migrate
    environment:
      MONGO_URI: ${COMPOSE_MONGODB_URI}
      MIGRATIONS_PATH: /app/migrations
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    networks:
      - jobby

  mongodb:
    image: mongo:8.0
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: jobby_admin
      MONGO_INITDB_ROOT_PASSWORD: jobby_admin_pass
      MONGO_INITDB_DATABASE: jobby
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jobby

networks:
  jobby:
    name: jobby

volumes:
  mongodb_data:
