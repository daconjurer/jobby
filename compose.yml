services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    image: jobby-migrate
    environment:
      MONGO_URI: ${COMPOSE_MONGODB_URI}
      MIGRATIONS_PATH: /app/migrations
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - jobby

  mongodb:
    image: mongo:8.0
    entrypoint:
      - bash
      - -c
      - |
        install -m 400 -o mongodb -g mongodb /keyfile/mongodb-replica.key /etc/mongodb-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongodb-keyfile
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: jobby_admin
      MONGO_INITDB_ROOT_PASSWORD: jobby_admin_pass
      MONGO_INITDB_DATABASE: jobby
    volumes:
      - mongodb_data:/data/db
      - ./config/mongodb-replica.key:/keyfile/mongodb-replica.key:ro
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "jobby_admin",
          "-p",
          "jobby_admin_pass",
          "--authenticationDatabase",
          "admin",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jobby

  mongo-init:
    image: mongo:8.0
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./docker/mongo-init-replica-set.sh:/docker/mongo-init-replica-set.sh:ro
    entrypoint:
      - bash
      - /docker/mongo-init-replica-set.sh
    networks:
      - jobby

  pulsar:
    image: apachepulsar/pulsar:3.3.2
    command: bin/pulsar standalone
    ports:
      - "6650:6650"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/admin/v2/clusters"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - jobby

  jobs-server:
    build:
      context: .
      dockerfile: Dockerfile.jobs-server
    image: jobby-jobs-server
    ports:
      - "3001:3001"
    environment:
      APP_PORT: "3001"
      MONGODB_URI: mongodb://jobby_app:jobby_app_pass@mongodb:27017/jobby?authSource=jobby&replicaSet=rs0
      MONGODB_DATABASE: jobby
      MONGODB_COLLECTION_METADATA: job_metadata
      MONGODB_COLLECTION_LOGS: job_logs
      MONGODB_TIMEOUT: 10s
      MONGODB_MAX_POOL_SIZE: "100"
      MONGODB_MIN_POOL_SIZE: "10"
      JOB_TOPICS_CONFIG_PATH: /app/config/job-topics.yaml
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - jobby

  jobs-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.jobs-dispatcher
    image: jobby-jobs-dispatcher
    environment:
      MONGODB_URI: mongodb://jobby_app:jobby_app_pass@mongodb:27017/jobby?authSource=jobby&replicaSet=rs0
      MONGODB_DATABASE: jobby
      MONGODB_COLLECTION_METADATA: job_metadata
      MONGODB_COLLECTION_LOGS: job_logs
      MONGODB_TIMEOUT: 10s
      MONGODB_MAX_POOL_SIZE: "100"
      MONGODB_MIN_POOL_SIZE: "10"
      PULSAR_SERVICE_URL: pulsar://pulsar:6650
      PULSAR_SUBSCRIPTION_NAME: jobber
      DISPATCH_POLL_INTERVAL: 5s
      DISPATCH_POLL_BATCH_SIZE: "50"
      DISPATCH_MAX_ATTEMPTS: "5"
      DISPATCH_STREAM_MAX_POOL_SIZE: "2"
      DISPATCH_STREAM_MONGODB_RESUME_TOKEN_PATH: /tmp/jobby-dispatch-mongodb-resume-token.json
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      pulsar:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jobby

  jobs-executor:
    build:
      context: .
      dockerfile: Dockerfile.jobs-executor
    image: jobby-jobs-executor
    environment:
      MONGODB_URI: mongodb://jobby_app:jobby_app_pass@mongodb:27017/jobby?authSource=jobby&replicaSet=rs0
      MONGODB_DATABASE: jobby
      MONGODB_COLLECTION_METADATA: job_metadata
      MONGODB_COLLECTION_LOGS: job_logs
      MONGODB_TIMEOUT: 10s
      MONGODB_MAX_POOL_SIZE: "100"
      MONGODB_MIN_POOL_SIZE: "10"
      PULSAR_SERVICE_URL: pulsar://pulsar:6650
      PULSAR_SUBSCRIPTION_NAME: jobber
      JOB_TOPICS_CONFIG_PATH: /app/config/job-topics.yaml
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      pulsar:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jobby

networks:
  jobby:
    name: jobby

volumes:
  mongodb_data:
